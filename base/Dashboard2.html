<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design OS - V4 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { bgbase: '#09090b', surface: '#18181b', border: '#27272a' }
                }
            }
        }
    </script>
    
    <style>
        body { background-color: #09090b; color: #e4e4e7; overflow: hidden; }
        
        /* Premium Scrollbar */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #52525b; }

        /* Card & Input Styles */
        .glass-panel { background: rgba(24, 24, 27, 0.7); backdrop-filter: blur(12px); border: 1px solid #27272a; }
        .app-input { background-color: #09090b; border: 1px solid #27272a; color: #f4f4f5; transition: all 0.2s ease; }
        .app-input:focus { border-color: #6366f1; outline: none; box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2); }
        
        .task-card { background-color: #18181b; border: 1px solid #27272a; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .task-card:hover { border-color: #52525b; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.4); }
        
        /* Drag & Drop States */
        .drag-over { border: 2px dashed #6366f1 !important; background-color: rgba(99, 102, 241, 0.05) !important; }
        .dragging { opacity: 0.4; transform: scale(0.98); border-color: #6366f1; }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        
        .glow-red { box-shadow: 0 0 10px rgba(239, 68, 68, 0.3); }
        
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .toast-enter { animation: slideInRight 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        
        /* Kanban Column Scroll */
        .kanban-col { height: calc(100vh - 340px); }
    </style>
</head>
<body class="p-6 h-screen flex flex-col gap-6 max-w-[1800px] mx-auto w-full font-sans">

    <header class="flex justify-between items-center shrink-0">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg shadow-indigo-500/20">
                <i data-lucide="layers" class="text-white w-5 h-5"></i>
            </div>
            <div>
                <h1 class="text-2xl font-bold text-white tracking-tight flex items-center gap-2">
                    Design OS <span class="bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 text-[10px] px-2 py-0.5 rounded-full uppercase tracking-wider font-semibold">Pro v4.0</span>
                </h1>
                <div class="flex gap-4 mt-1">
                    <button onclick="toggleView('kanban')" id="btn-kanban" class="text-sm font-medium text-indigo-400 transition-colors flex items-center gap-1.5"><i data-lucide="layout-dashboard" class="w-4 h-4"></i> Board</button>
                    <button onclick="toggleView('table')" id="btn-table" class="text-sm font-medium text-zinc-500 hover:text-zinc-300 transition-colors flex items-center gap-1.5"><i data-lucide="table-2" class="w-4 h-4"></i> Lista</button>
                </div>
            </div>
        </div>

        <div class="flex gap-3 items-center">
            <div class="relative">
                <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-zinc-500"></i>
                <input type="text" id="search-input" placeholder="Buscar... (Ctrl+K)" class="app-input rounded-lg pl-9 pr-4 py-2 text-sm w-64">
            </div>
            <select id="filter-type" class="app-input rounded-lg px-3 py-2 text-sm cursor-pointer" onchange="render()">
                <option value="">Todas as Tags</option>
                <option value="Feed">Feed/Post</option>
                <option value="Story">Story</option>
                <option value="Vídeo">Vídeo</option>
                <option value="Alta">🚨 Urgentes</option>
            </select>

            <div class="w-px h-8 bg-border mx-2"></div>

            <div class="flex gap-2">
                <button onclick="exportData()" class="p-2 text-zinc-400 hover:text-white hover:bg-zinc-800 rounded-lg transition-all" title="Backup"><i data-lucide="download" class="w-5 h-5"></i></button>
                <label class="p-2 text-zinc-400 hover:text-white hover:bg-zinc-800 rounded-lg transition-all cursor-pointer" title="Importar">
                    <i data-lucide="upload" class="w-5 h-5"></i>
                    <input type="file" id="import-file" class="hidden" accept=".json" onchange="importData(event)">
                </label>
                <button onclick="clearDone()" class="p-2 text-emerald-400 hover:text-emerald-300 hover:bg-emerald-500/10 rounded-lg transition-all" title="Limpar Concluídos"><i data-lucide="check-check" class="w-5 h-5"></i></button>
            </div>
        </div>
    </header>

    <section class="grid grid-cols-5 gap-4 shrink-0">
        <div class="glass-panel rounded-xl p-4 relative overflow-hidden group">
            <div class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity"><i data-lucide="loader" class="w-12 h-12"></i></div>
            <span class="text-xs text-zinc-400 font-medium uppercase tracking-wider">Fila Ativa</span>
            <span class="text-3xl font-bold text-white block mt-2" id="stat-pending">0</span>
            <div class="mt-2 h-1 w-full bg-zinc-800 rounded-full overflow-hidden">
                <div id="progress-bar" class="h-full bg-indigo-500 transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>
        <div class="glass-panel rounded-xl p-4">
            <span class="text-xs text-zinc-400 font-medium uppercase tracking-wider">Horas Estimadas</span>
            <span class="text-3xl font-bold text-white block mt-2 flex items-baseline gap-1"><span id="stat-hours">0</span><span class="text-sm text-zinc-500 font-normal">h</span></span>
        </div>
        <div class="glass-panel rounded-xl p-4 border-l-2 border-l-emerald-500">
            <span class="text-xs text-emerald-400 font-medium uppercase tracking-wider">Concluídos</span>
            <span class="text-3xl font-bold text-white block mt-2" id="stat-done">0</span>
        </div>
        <div class="glass-panel rounded-xl p-4 border-l-2 border-l-rose-500 bg-rose-500/5">
            <span class="text-xs text-rose-400 font-medium uppercase tracking-wider">Gargalos / Travados</span>
            <span class="text-3xl font-bold text-white block mt-2" id="stat-blocked">0</span>
        </div>
        <div class="glass-panel rounded-xl p-4">
            <span class="text-xs text-zinc-400 font-medium uppercase tracking-wider">Top Cliente</span>
            <span class="text-xl font-bold text-indigo-400 block mt-3 truncate" id="stat-client">-</span>
        </div>
    </section>

    <section class="glass-panel rounded-xl p-2 shrink-0 z-10 shadow-2xl relative">
        <form id="capture-form" class="flex gap-2">
            <input type="text" id="client-input" placeholder="Cliente" required class="app-input rounded-lg px-4 py-3 w-48 font-medium text-sm">
            
            <div class="relative flex-1">
                <input type="text" id="demand-input" placeholder="O que precisa ser feito? (Ex: Carrossel 5 slides para ontem)" required class="app-input rounded-lg px-4 py-3 w-full text-sm" autocomplete="off">
                <div id="suggestions-box" class="hidden absolute top-full left-0 w-full mt-2 bg-surface border border-border rounded-lg shadow-2xl overflow-hidden z-50">
                    <ul id="suggestions-list" class="max-h-40 overflow-y-auto"></ul>
                </div>
            </div>

            <div class="flex items-center gap-2 app-input rounded-lg px-3 w-32" title="Tempo Estimado (Horas)">
                <i data-lucide="clock" class="w-4 h-4 text-zinc-500"></i>
                <input type="number" id="hours-input" placeholder="Horas" min="0.5" step="0.5" class="bg-transparent border-none text-sm w-full focus:outline-none text-white">
            </div>

            <input type="date" id="deadline-input" class="app-input rounded-lg px-3 py-3 text-sm text-zinc-400 w-36" title="Prazo">

            <button type="submit" class="bg-indigo-600 hover:bg-indigo-500 text-white font-medium px-6 py-2 rounded-lg transition-all flex items-center gap-2 shadow-lg shadow-indigo-500/20 active:scale-95 whitespace-nowrap">
                <i data-lucide="plus" class="w-4 h-4"></i> Criar
            </button>
        </form>
    </section>

    <section id="view-kanban" class="flex-1 grid grid-cols-5 gap-4 overflow-hidden pb-2">
        </section>

    <section id="view-table" class="hidden flex-1 glass-panel rounded-xl overflow-auto pb-2 relative">
        <table class="w-full text-left border-collapse text-sm">
            <thead>
                <tr class="text-zinc-400 border-b border-border bg-surface/50">
                    <th class="p-4 font-medium w-40">Status</th>
                    <th class="p-4 font-medium">Cliente</th>
                    <th class="p-4 font-medium">Demanda</th>
                    <th class="p-4 font-medium">Tipo</th>
                    <th class="p-4 font-medium">Esforço</th>
                    <th class="p-4 font-medium">Prazo</th>
                    <th class="p-4 font-medium text-right">Ações</th>
                </tr>
            </thead>
            <tbody id="table-body" class="text-zinc-300 divide-y divide-border"></tbody>
        </table>
    </section>

    <div id="edit-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
        <div class="surface glass-panel p-6 rounded-2xl w-full max-w-lg shadow-2xl border border-zinc-700 animate-fade-in">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-lg font-bold text-white flex items-center gap-2"><i data-lucide="pen-line" class="w-5 h-5 text-indigo-400"></i> Editar Job</h2>
                <button type="button" onclick="closeModal()" class="text-zinc-500 hover:text-white"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            
            <form id="edit-form" class="flex flex-col gap-5">
                <input type="hidden" id="edit-id">
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-xs text-zinc-400 mb-1.5 block font-medium">Cliente</label><input type="text" id="edit-client" class="app-input rounded-lg p-2.5 w-full text-sm"></div>
                    <div><label class="text-xs text-zinc-400 mb-1.5 block font-medium">Título Curto</label><input type="text" id="edit-title" class="app-input rounded-lg p-2.5 w-full text-sm"></div>
                </div>
                <div><label class="text-xs text-zinc-400 mb-1.5 block font-medium">Briefing / Demanda Completa</label><textarea id="edit-demand" rows="3" class="app-input rounded-lg p-3 w-full text-sm resize-none"></textarea></div>
                <div class="grid grid-cols-4 gap-4">
                    <div class="col-span-1"><label class="text-xs text-zinc-400 mb-1.5 block font-medium">Horas</label><input type="number" step="0.5" id="edit-hours" class="app-input rounded-lg p-2.5 w-full text-sm"></div>
                    <div class="col-span-1">
                        <label class="text-xs text-zinc-400 mb-1.5 block font-medium">Tipo</label>
                        <select id="edit-type" class="app-input rounded-lg p-2.5 w-full text-sm cursor-pointer"><option>Feed</option><option>Story</option><option>Vídeo</option><option>Identidade</option><option>Outro</option></select>
                    </div>
                    <div class="col-span-1">
                        <label class="text-xs text-zinc-400 mb-1.5 block font-medium">Prioridade</label>
                        <select id="edit-priority" class="app-input rounded-lg p-2.5 w-full text-sm cursor-pointer"><option>Normal</option><option>Alta</option><option>Baixa</option></select>
                    </div>
                    <div class="col-span-1"><label class="text-xs text-zinc-400 mb-1.5 block font-medium">Prazo</label><input type="date" id="edit-deadline" class="app-input rounded-lg p-2.5 w-full text-sm text-zinc-300 cursor-pointer"></div>
                </div>
                <div class="flex justify-end gap-3 mt-2 pt-5 border-t border-border">
                    <button type="button" onclick="closeModal()" class="px-5 py-2 rounded-lg text-sm font-medium text-zinc-400 hover:text-white hover:bg-zinc-800 transition-colors">Cancelar</button>
                    <button type="submit" class="px-5 py-2 rounded-lg text-sm bg-indigo-600 text-white hover:bg-indigo-500 font-semibold shadow-lg shadow-indigo-500/20 transition-all">Salvar Alterações</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast-container" class="fixed bottom-6 right-6 flex flex-col gap-3 z-[200]"></div>

    <script>
        // --- COLUNAS DO KANBAN ---
        const columns = [
            { id: 'inbox', title: 'Caixa de Entrada', icon: 'inbox', color: 'text-zinc-400', border: 'border-zinc-800' },
            { id: 'today', title: 'Fazer Hoje', icon: 'zap', color: 'text-indigo-400', border: 'border-indigo-900/50' },
            { id: 'later', title: 'Agendado / Depois', icon: 'calendar', color: 'text-blue-400', border: 'border-blue-900/30' },
            { id: 'blocked', title: 'Aguardando Aprovação', icon: 'alert-circle', color: 'text-rose-400', border: 'border-rose-900/30' },
            { id: 'done', title: 'Concluído', icon: 'check-circle-2', color: 'text-emerald-500', border: 'border-emerald-900/30' }
        ];

        // Gerar colunas dinamicamente
        const kanbanContainer = document.getElementById('view-kanban');
        columns.forEach(col => {
            kanbanContainer.innerHTML += `
                <div class="flex flex-col gap-3 h-full">
                    <div class="flex justify-between items-center px-1">
                        <h3 class="font-semibold ${col.color} text-sm flex items-center gap-1.5"><i data-lucide="${col.icon}" class="w-4 h-4"></i> ${col.title}</h3>
                        <span id="c-${col.id}" class="text-xs font-medium px-2 py-0.5 rounded-full bg-zinc-800 text-zinc-400">0</span>
                    </div>
                    <div id="${col.id}" class="kanban-col rounded-xl border border-dashed ${col.border} bg-surface/30 p-2.5 flex flex-col gap-2.5 overflow-y-auto transition-colors" ondrop="drop(event)" ondragover="allowDrop(event)">
                    </div>
                </div>
            `;
        });

        // --- 1. DADOS E BANCO LOCAL ---
        let tasks = JSON.parse(localStorage.getItem('designOS_tasks_v4')) || [];
        
        // Migração da v3 para v4
        const oldTasks = JSON.parse(localStorage.getItem('designOS_tasks_v3'));
        if (oldTasks && tasks.length === 0) { 
            tasks = oldTasks.map(t => ({...t, hours: 1})); // Adiciona horas default
            saveDb(); 
        }

        function saveDb() { localStorage.setItem('designOS_tasks_v4', JSON.stringify(tasks)); }

        // --- 2. SISTEMA DE NOTIFICAÇÕES ---
        function showToast(message, type = 'success') {
            const colors = { success: 'bg-emerald-600', error: 'bg-rose-600', info: 'bg-indigo-600' };
            const icons = { success: 'check', error: 'alert-triangle', info: 'info' };
            const toast = document.createElement('div');
            toast.className = `${colors[type]} text-white px-4 py-3 rounded-lg shadow-xl shadow-black/50 text-sm font-medium toast-enter flex items-center gap-2.5 border border-white/10`;
            toast.innerHTML = `<i data-lucide="${icons[type]}" class="w-4 h-4"></i> <span>${message}</span>`;
            document.getElementById('toast-container').appendChild(toast);
            lucide.createIcons({ root: toast });
            setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateX(100%)'; toast.style.transition = 'all 0.3s'; setTimeout(() => toast.remove(), 300); }, 4000);
        }

        // --- 3. UI Toggles ---
        let currentView = 'kanban';
        function toggleView(view) {
            currentView = view;
            document.getElementById('view-kanban').classList.toggle('hidden', view !== 'kanban');
            document.getElementById('view-table').classList.toggle('hidden', view !== 'table');
            
            const activeClass = "text-sm font-semibold text-indigo-400 bg-indigo-500/10 px-3 py-1.5 rounded-md flex items-center gap-1.5";
            const inactiveClass = "text-sm font-medium text-zinc-500 hover:text-zinc-300 px-3 py-1.5 rounded-md flex items-center gap-1.5 transition-colors";
            
            document.getElementById('btn-kanban').className = view === 'kanban' ? activeClass : inactiveClass;
            document.getElementById('btn-table').className = view === 'table' ? activeClass : inactiveClass;
            render();
        }

        document.getElementById('deadline-input').min = new Date().toISOString().split('T')[0];

        // --- 4. RENDERIZAÇÃO E FILTROS ---
        function render() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const filterValue = document.getElementById('filter-type').value;

            const filtered = tasks.filter(t => {
                const matchSearch = !query || t.client.toLowerCase().includes(query) || t.demand.toLowerCase().includes(query) || t.title.toLowerCase().includes(query);
                const matchFilter = !filterValue || (filterValue === 'Alta' ? t.priority === 'Alta' : t.type.includes(filterValue));
                return matchSearch && matchFilter;
            });

            // Dashboards
            const pendingTasks = tasks.filter(t => t.status !== 'done' && t.status !== 'blocked');
            const doneTasks = tasks.filter(t => t.status === 'done');
            
            document.getElementById('stat-pending').innerText = pendingTasks.length;
            document.getElementById('stat-done').innerText = doneTasks.length;
            document.getElementById('stat-blocked').innerText = tasks.filter(t => t.status === 'blocked').length;
            
            // Calc Hours
            const totalHours = pendingTasks.reduce((acc, curr) => acc + (parseFloat(curr.hours) || 0), 0);
            document.getElementById('stat-hours').innerText = totalHours.toFixed(1).replace('.0', '');

            // Progress Bar
            const totalAll = tasks.length;
            const progress = totalAll === 0 ? 0 : Math.round((doneTasks.length / totalAll) * 100);
            document.getElementById('progress-bar').style.width = `${progress}%`;

            const clients = {};
            tasks.forEach(t => { if(t.status!=='done') { clients[t.client] = (clients[t.client] || 0) + 1; }});
            document.getElementById('stat-client').innerText = Object.keys(clients).sort((a,b) => clients[b]-clients[a])[0] || "Nenhum";

            // Col counters
            columns.forEach(col => {
                const count = filtered.filter(t => t.status === col.id).length;
                document.getElementById('c-'+col.id).innerText = count;
            });

            if (currentView === 'kanban') renderKanban(filtered); else renderTable(filtered);
            lucide.createIcons(); // Recarrega os ícones após re-renderizar o DOM
        }

        function formatDeadline(dateString, isDone) {
            if (!dateString) return `<span class="flex items-center gap-1 text-[11px] text-zinc-600"><i data-lucide="calendar-off" class="w-3 h-3"></i> Sem prazo</span>`;
            const date = new Date(dateString);
            const today = new Date(); today.setHours(0,0,0,0);
            const dtStr = date.toLocaleDateString('pt-BR', { timeZone: 'UTC', day: '2-digit', month: '2-digit' });
            
            if (isDone) return `<span class="flex items-center gap-1 text-[11px] text-zinc-500 line-through"><i data-lucide="flag" class="w-3 h-3"></i> ${dtStr}</span>`;
            if (date < today) return `<span class="flex items-center gap-1 text-[11px] text-rose-400 font-semibold"><i data-lucide="alert-triangle" class="w-3 h-3"></i> Atrasado (${dtStr})</span>`;
            if (date.getTime() === today.getTime()) return `<span class="flex items-center gap-1 text-[11px] text-amber-400 font-bold"><i data-lucide="flame" class="w-3 h-3"></i> Hoje</span>`;
            return `<span class="flex items-center gap-1 text-[11px] text-zinc-400"><i data-lucide="calendar" class="w-3 h-3"></i> ${dtStr}</span>`;
        }

        function renderKanban(filteredTasks) {
            columns.forEach(col => {
                const colEl = document.getElementById(col.id);
                colEl.innerHTML = '';
                
                const tasksInCol = filteredTasks.filter(t => t.status === col.id);
                
                if(tasksInCol.length === 0) {
                    colEl.innerHTML = `<div class="flex flex-col items-center justify-center h-24 text-zinc-600 border border-dashed border-zinc-800 rounded-lg"><i data-lucide="ghost" class="w-5 h-5 mb-1 opacity-50"></i><span class="text-[10px] uppercase tracking-wide">Vazio</span></div>`;
                    return;
                }

                tasksInCol.forEach(task => {
                    const isDone = task.status === 'done';
                    const isHigh = task.priority === 'Alta';
                    const pColor = isHigh ? 'text-rose-400 bg-rose-500/10 border-rose-500/20 glow-red' : 'text-indigo-400 bg-indigo-500/10 border-indigo-500/20';
                    const hrIcon = `<i data-lucide="clock" class="w-3 h-3 inline"></i> ${task.hours || 0}h`;

                    const html = `
                        <div id="${task.id}" class="task-card p-3.5 rounded-xl cursor-grab flex flex-col gap-2 relative group animate-fade-in" draggable="true" ondragstart="drag(event)">
                            <div class="flex justify-between items-start mb-1">
                                <span class="text-[10px] font-bold px-2 py-0.5 rounded bg-zinc-800 border border-zinc-700 text-zinc-300 uppercase truncate max-w-[120px]">${task.client}</span>
                                <span class="text-[10px] font-semibold px-2 py-0.5 rounded border ${pColor}">${task.type}</span>
                            </div>
                            <h4 class="text-sm font-bold text-white leading-tight ${isDone ? 'line-through text-zinc-500' : ''}">${task.title}</h4>
                            <p class="text-xs text-zinc-400 line-clamp-2 leading-relaxed" title="${task.demand}">${task.demand}</p>
                            
                            <div class="mt-3 pt-3 border-t border-border flex justify-between items-center">
                                <div class="flex items-center gap-3">
                                    ${formatDeadline(task.deadline, isDone)}
                                    <span class="text-[11px] text-zinc-500 font-medium">${hrIcon}</span>
                                </div>
                                <div class="flex gap-1.5 opacity-0 group-hover:opacity-100 transition-opacity bg-surface pl-2">
                                    <button onclick="openModal('${task.id}')" class="p-1 text-zinc-400 hover:text-white hover:bg-zinc-700 rounded transition-colors" title="Editar"><i data-lucide="edit-2" class="w-3.5 h-3.5"></i></button>
                                    <button onclick="duplicateTask('${task.id}')" class="p-1 text-zinc-400 hover:text-indigo-400 hover:bg-indigo-500/10 rounded transition-colors" title="Duplicar"><i data-lucide="copy" class="w-3.5 h-3.5"></i></button>
                                    <button onclick="deleteTask('${task.id}')" class="p-1 text-zinc-400 hover:text-rose-400 hover:bg-rose-500/10 rounded transition-colors" title="Excluir"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
                                </div>
                            </div>
                        </div>
                    `;
                    colEl.insertAdjacentHTML('beforeend', html);
                });
            });
        }

        function renderTable(filteredTasks) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            
            if(filteredTasks.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="p-8 text-center text-zinc-500"><i data-lucide="search-x" class="w-8 h-8 mx-auto mb-2 opacity-50"></i>Nenhum job encontrado.</td></tr>`;
                return;
            }

            const statusMap = { inbox: 'Caixa de Entrada', today: 'Fazer Hoje', later: 'Agendado', blocked: 'Travado', done: 'Concluído' };

            filteredTasks.forEach(task => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-zinc-900/50 transition-colors group";
                tr.innerHTML = `
                    <td class="p-4"><select onchange="changeStatus('${task.id}', this.value)" class="app-input text-xs rounded p-1.5 cursor-pointer">${Object.entries(statusMap).map(([k, v]) => `<option value="${k}" ${task.status === k ? 'selected' : ''}>${v}</option>`).join('')}</select></td>
                    <td class="p-4 font-semibold text-zinc-300">
                        <div class="flex items-center gap-2">
                            <div class="w-6 h-6 rounded bg-zinc-800 border border-border flex items-center justify-center text-[10px] uppercase">${task.client.substring(0,2)}</div>
                            ${task.client}
                        </div>
                    </td>
                    <td class="p-4">
                        <div class="text-white font-medium mb-0.5">${task.title}</div>
                        <div class="text-xs text-zinc-500 truncate max-w-[250px]">${task.demand}</div>
                    </td>
                    <td class="p-4"><span class="px-2 py-1 rounded bg-zinc-800 border border-border text-[10px] uppercase font-medium">${task.type}</span></td>
                    <td class="p-4 text-xs text-zinc-400 flex items-center gap-1 mt-3"><i data-lucide="clock" class="w-3 h-3"></i> ${task.hours || 0}h</td>
                    <td class="p-4">${formatDeadline(task.deadline, task.status === 'done')}</td>
                    <td class="p-4 text-right opacity-0 group-hover:opacity-100 transition-opacity">
                        <button onclick="openModal('${task.id}')" class="p-1.5 text-zinc-400 hover:text-white rounded" title="Editar"><i data-lucide="edit-2" class="w-4 h-4"></i></button>
                        <button onclick="deleteTask('${task.id}')" class="p-1.5 text-zinc-400 hover:text-rose-400 rounded" title="Excluir"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // --- 5. AÇÕES ---
        document.getElementById('capture-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const client = document.getElementById('client-input').value;
            const demand = document.getElementById('demand-input').value;
            const customDeadline = document.getElementById('deadline-input').value;
            const hours = document.getElementById('hours-input').value || 1;
            
            // Automação inteligente
            const low = demand.toLowerCase();
            let type = "Outro", priority = "Normal";
            if(low.match(/post|feed|carrossel/)) type = "Feed";
            if(low.match(/story|stories/)) type = "Story";
            if(low.match(/v[ií]deo|reels|tiktok|youtube|motion/)) type = "Vídeo";
            if(low.match(/urgente|pra ontem|hoje|agora/)) priority = "Alta";
            
            const words = demand.split(" ");
            const title = `${client.substring(0,3).toUpperCase()} - ${words.slice(0, 3).join(" ")}`;

            tasks.unshift({
                id: 'task_' + Date.now(), client, demand, title, type, priority, hours, status: 'inbox', date: new Date().toISOString(),
                deadline: customDeadline || '' // Sem prazo default para não poluir
            });

            saveDb();
            document.getElementById('suggestions-box').classList.add('hidden');
            this.reset(); 
            document.getElementById('client-input').focus();
            showToast('Job criado com sucesso!');
            render();
        });

        // Modal de Edição
        function openModal(id) {
            const t = tasks.find(x => x.id === id);
            if(!t) return;
            document.getElementById('edit-id').value = t.id;
            document.getElementById('edit-client').value = t.client;
            document.getElementById('edit-title').value = t.title;
            document.getElementById('edit-demand').value = t.demand;
            document.getElementById('edit-hours').value = t.hours || 1;
            document.getElementById('edit-type').value = t.type;
            document.getElementById('edit-priority').value = t.priority;
            document.getElementById('edit-deadline').value = t.deadline || '';
            
            const modal = document.getElementById('edit-modal');
            modal.classList.remove('hidden');
        }

        function closeModal() { document.getElementById('edit-modal').classList.add('hidden'); }

        document.getElementById('edit-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const id = document.getElementById('edit-id').value;
            const taskIndex = tasks.findIndex(t => t.id === id);
            if(taskIndex > -1) {
                tasks[taskIndex].client = document.getElementById('edit-client').value;
                tasks[taskIndex].title = document.getElementById('edit-title').value;
                tasks[taskIndex].demand = document.getElementById('edit-demand').value;
                tasks[taskIndex].hours = document.getElementById('edit-hours').value;
                tasks[taskIndex].type = document.getElementById('edit-type').value;
                tasks[taskIndex].priority = document.getElementById('edit-priority').value;
                tasks[taskIndex].deadline = document.getElementById('edit-deadline').value;
                saveDb(); closeModal(); render(); showToast('Card atualizado!', 'info');
            }
        });

        function duplicateTask(id) {
            const t = tasks.find(x => x.id === id);
            if(t) {
                tasks.unshift({ ...t, id: 'task_' + Date.now(), title: '[Cópia] ' + t.title, status: 'inbox' });
                saveDb(); render(); showToast('Job duplicado!');
            }
        }

        function deleteTask(id) {
            if(confirm('Tem certeza que deseja excluir este Job permanentemente?')) {
                tasks = tasks.filter(t => t.id !== id);
                saveDb(); render(); showToast('Job excluído!', 'error');
            }
        }

        function clearDone() {
            const doneCount = tasks.filter(t => t.status === 'done').length;
            if(doneCount === 0) return showToast('Nenhuma tarefa concluída para limpar.', 'info');
            
            if(confirm(`Isso apagará ${doneCount} jobs concluídos. Tem certeza?`)) {
                tasks = tasks.filter(t => t.status !== 'done');
                saveDb(); render(); showToast('Jobs antigos removidos.', 'info');
            }
        }

        function changeStatus(id, newStatus) {
            const task = tasks.find(t => t.id === id);
            if(task) { task.status = newStatus; saveDb(); render(); }
        }

        // --- 6. DRAG AND DROP ---
        function allowDrop(ev) { 
            ev.preventDefault(); 
            if(ev.currentTarget.classList.contains('kanban-col')) {
                ev.currentTarget.classList.add('drag-over'); 
            }
        }
        function drag(ev) { ev.dataTransfer.setData("text", ev.target.id); ev.target.classList.add('dragging'); }
        function drop(ev) {
            ev.preventDefault();
            document.querySelectorAll('.dragging').forEach(el => el.classList.remove('dragging'));
            
            let targetCol = ev.currentTarget;
            if(!targetCol.classList.contains('kanban-col')) {
                targetCol = targetCol.closest('.kanban-col'); // fallback caso solte em cima de outro card
            }
            
            if(targetCol) {
                targetCol.classList.remove('drag-over');
                changeStatus(ev.dataTransfer.getData("text"), targetCol.id);
            }
        }
        
        document.addEventListener('dragend', () => {
            document.querySelectorAll('.dragging').forEach(el => el.classList.remove('dragging'));
            document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
        });
        
        document.addEventListener('dragleave', (e) => {
            if(e.target.classList && e.target.classList.contains('kanban-col')) {
                e.target.classList.remove('drag-over');
            }
        });

        // --- 7. EXPORT / IMPORT (Backup) ---
        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(tasks));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", `DesignOS_Pro_Backup_${new Date().toISOString().split('T')[0]}.json`);
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
            showToast('Backup baixado com sucesso!');
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedTasks = JSON.parse(e.target.result);
                    if (Array.isArray(importedTasks)) {
                        if(confirm('Isso substituirá suas tarefas atuais pelos dados do arquivo. Deseja continuar?')) {
                            tasks = importedTasks; saveDb(); render(); showToast('Backup restaurado!');
                        }
                    } else { alert("Arquivo inválido."); }
                } catch (err) { alert("Erro ao ler o arquivo."); }
            };
            reader.readAsText(file);
            event.target.value = ''; // reseta o input
        }

        // --- 8. HISTÓRICO INTELIGENTE & ATALHOS ---
        const demandInput = document.getElementById('demand-input');
        const suggestBox = document.getElementById('suggestions-box');
        
        demandInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            if (term.length < 3) { suggestBox.classList.add('hidden'); return; }
            const matches = [...new Set(tasks.filter(t => t.demand.toLowerCase().includes(term)).map(t => t.demand))].slice(0, 4);
            
            if (matches.length > 0) {
                document.getElementById('suggestions-list').innerHTML = matches.map(m => `
                    <li class="px-4 py-2 hover:bg-zinc-800 cursor-pointer text-sm text-zinc-300 border-b border-border flex items-center gap-2 transition-colors" onclick="useSuggestion('${m}')">
                        <i data-lucide="history" class="w-3 h-3 text-zinc-500"></i> ${m}
                    </li>`).join('');
                suggestBox.classList.remove('hidden');
                lucide.createIcons({ root: document.getElementById('suggestions-list') });
            } else {
                suggestBox.classList.add('hidden');
            }
        });

        function useSuggestion(text) { demandInput.value = text; suggestBox.classList.add('hidden'); demandInput.focus(); }
        
        document.addEventListener('click', e => { if (!e.target.closest('.relative')) suggestBox.classList.add('hidden'); });
        
        // Atalhos de teclado
        document.getElementById('search-input').addEventListener('input', render);
        document.addEventListener('keydown', e => { 
            if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'k') { 
                e.preventDefault(); 
                document.getElementById('search-input').focus(); 
            }
        });

        // Initialize
        render();
    </script>
</body>
</html>
